name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore shopping.slnx

      - name: Test
        run: dotnet test shopping.slnx --configuration Release --no-restore --logger "trx;LogFileName=backend-tests.trx"

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/*.trx"

  frontend:
    name: Frontend build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: src/Web/web-store-angular
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/Web/web-store-angular/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm packages
        run: npm audit --audit-level=high

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Unit and component tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Web/web-store-angular/playwright-report
          if-no-files-found: ignore

  package-audit:
    name: .NET package audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore with vulnerability audit
        run: dotnet restore shopping.slnx /p:NuGetAudit=true /p:NuGetAuditLevel=high
