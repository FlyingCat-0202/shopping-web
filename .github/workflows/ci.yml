name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore shopping.slnx

      - name: Test
        run: dotnet test shopping.slnx --configuration Release --no-restore -m:1 --logger "trx;LogFileName=backend-tests.trx"

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/*.trx"

  frontend:
    name: Frontend build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: src/Web/web-store-angular
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/Web/web-store-angular/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm packages
        run: npm audit --audit-level=high

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Unit and component tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Web/web-store-angular/playwright-report
          if-no-files-found: ignore

  package-audit:
    name: .NET package audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore with vulnerability audit
        run: dotnet restore shopping.slnx /p:NuGetAudit=true /p:NuGetAuditLevel=high

  container-build:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs:
      - backend
      - frontend
      - package-audit
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api-gateway
            project: src/Gateways/ApiGateway/ApiGateway.csproj
            dll: ApiGateway.dll
          - image: identity-api
            project: src/Services/Identity/Identity.API/Identity.API.csproj
            dll: Identity.API.dll
          - image: product-api
            project: src/Services/Product/Product.API/Product.API.csproj
            dll: Product.API.dll
          - image: cart-api
            project: src/Services/Cart/Cart.API/Cart.API.csproj
            dll: Cart.API.dll
          - image: order-api
            project: src/Services/Order/Order.API/Order.API.csproj
            dll: Order.API.dll
          - image: payment-api
            project: src/Services/Payment/Payment.API/Payment.API.csproj
            dll: Payment.API.dll
          - image: notification-api
            project: src/Services/Notification/Notification.API/Notification.API.csproj
            dll: Notification.API.dll
          - image: web-store-angular
            frontend: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .NET service image
        if: ${{ matrix.frontend != true }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dotnet-service
          push: false
          tags: shopping-web/${{ matrix.image }}:ci
          build-args: |
            PROJECT=${{ matrix.project }}
            APP_DLL=${{ matrix.dll }}

      - name: Build frontend image
        if: ${{ matrix.frontend == true }}
        uses: docker/build-push-action@v6
        with:
          context: src/Web/web-store-angular
          file: src/Web/web-store-angular/Dockerfile
          push: false
          tags: shopping-web/web-store-angular:ci
