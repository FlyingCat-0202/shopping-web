<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{PROVIDER_NAME}} Wallet</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: {{PAGE_BACKGROUND_COLOR}};
      color: #1c1830;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(420px, 100%);
      background: #ffffff;
      border: 1px solid {{BORDER_COLOR}};
      border-radius: 8px;
      box-shadow: 0 18px 50px {{SHADOW_COLOR}};
      padding: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: {{ACCENT_COLOR}};
      color: #ffffff;
      font-weight: 800;
    }

    h1, p {
      margin: 0;
    }

    h1 {
      font-size: 1.4rem;
    }

    .muted {
      color: #6f6784;
      line-height: 1.5;
    }

    .amount {
      margin: 24px 0 8px;
      font-size: 2.3rem;
      font-weight: 800;
    }

    .meta {
      display: grid;
      gap: 8px;
      margin: 20px 0;
      font-size: 0.92rem;
      color: #514b62;
      word-break: break-all;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success {
      background: #16a34a;
      color: #ffffff;
    }

    .fail {
      background: #fee2e2;
      color: #991b1b;
    }

    #result {
      min-height: 24px;
      margin-top: 18px;
      color: #43345f;
    }
  </style>
</head>
<body
  data-provider='{{PROVIDER_ROUTE_JSON}}'
  data-token='{{TOKEN_JSON}}'
  data-payment-id='{{PAYMENT_ID_JSON}}'>
  <main>
    <section class="brand">
      <div class="mark">{{PROVIDER_MARK}}</div>
      <div>
        <h1>{{PROVIDER_NAME}} Wallet</h1>
        <p class="muted">Fake checkout for local testing</p>
      </div>
    </section>

    <p class="muted">{{MESSAGE}}</p>
    <div class="amount">${{AMOUNT}}</div>

    <section class="meta">
      <span>Payment: {{PAYMENT_ID}}</span>
      <span>Order: {{ORDER_ID}}</span>
      <span>Status: {{STATUS}}</span>
    </section>

    <section class="actions">
      <button class="success" type="button" {{DISABLED_ATTRIBUTE}} onclick="completePayment(true)">Success</button>
      <button class="fail" type="button" {{DISABLED_ATTRIBUTE}} onclick="completePayment(false)">Fail</button>
    </section>

    <p id="result" class="muted"></p>
  </main>

  <script>
    const provider = JSON.parse(document.body.getAttribute('data-provider') || 'null');
    const token = JSON.parse(document.body.getAttribute('data-token') || 'null');
    const paymentId = JSON.parse(document.body.getAttribute('data-payment-id') || 'null');

    async function completePayment(success) {
      const result = document.getElementById("result");
      result.textContent = "Sending result to Payment service...";

      try {
        const response = await fetch(`/api/payment/providers/${provider}/checkout/${paymentId}/complete`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ success, token })
        });

        const payload = await response.json().catch(() => null);
        if (!response.ok) {
          result.textContent = payload?.message ?? "Payment service rejected the wallet result.";
          return;
        }

        result.textContent = success
          ? `${payload.paymentMethod ?? "Wallet"} marked the payment as succeeded. You can return to the shop.`
          : `${payload.paymentMethod ?? "Wallet"} marked the payment as failed. You can return to the shop.`;
      } catch {
        result.textContent = "Cannot reach Payment service.";
      }
    }
  </script>
</body>
</html>
